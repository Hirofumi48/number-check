<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車両照合（実測座標・4分割）</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding-bottom: 50px; }
        #camera-container { position: sticky; top: 0; background: #000; z-index: 10; height: 40vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #focus-guide { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 80vw; height: 40vw; border: 3px solid #00FF00; border-radius: 4px;
            box-shadow: 0 0 0 5000px rgba(0, 0, 0, 0.6); pointer-events: none;
        }
        #action-area { display: flex; justify-content: center; gap: 20px; margin: -35px auto 10px; position: relative; z-index: 100; }
        .shutter-btn { width: 70px; height: 70px; background: white; border: 5px solid #007AFF; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #result-container { margin: 10px 15px; padding: 15px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); text-align: left; }
        #status { font-size: 14px; color: #007AFF; font-weight: bold; text-align: center; background: #eef; padding: 5px; border-radius: 4px; }
        .res-plate-num { font-size: 36px; font-weight: bold; color: #007AFF; text-align: center; display: block; letter-spacing: 4px; margin: 10px 0; }
        #debug-area { background: #eee; padding: 10px; margin: 10px; font-size: 11px; border-radius: 8px; }
        .debug-canvas { border: 2px solid #333; margin: 2px; width: 60px; height: auto; background: white; }
    </style>
</head>
<body>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <div id="focus-guide"></div>
</div>

<div id="action-area">
    <button id="shutter" class="shutter-btn"></button>
</div>

<div style="margin: 15px;">
    <input type="file" id="fileInput" accept=".csv" style="display:none;">
    <button onclick="document.getElementById('fileInput').click()" style="padding:10px 20px; background:#34c759; color:white; border:none; border-radius:8px; font-weight:bold;">📁 名簿CSVを読込</button>
</div>

<div id="result-container">
    <div id="status">Ready</div>
    <div id="info-display"></div>
</div>

<div id="debug-area">
    【実測座標・個別抽出プレビュー】<br>
    <div id="canvas-holder" style="display:flex; justify-content:center; margin-top:5px;"></div>
</div>

<script>
const video = document.getElementById('video');
const shutter = document.getElementById('shutter');
const statusDiv = document.getElementById('status');
const infoDisplay = document.getElementById('info-display');
const fileInput = document.getElementById('fileInput');
const canvasHolder = document.getElementById('canvas-holder');

let employeeList = [];
let isProcessing = false;

async function recognizeChar(canvas) {
    const result = await Tesseract.recognize(canvas, 'eng', {
        tessedit_char_whitelist: '0123456789',
        tessedit_pageseg_mode: '8' 
    });
    const cleanStr = result.data.text.replace(/[^0-9]/g, '').trim();
    return cleanStr.length > 0 ? cleanStr[0] : "";
}

fileInput.onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
        employeeList = ev.target.result.split('\n').map(r => {
            const c = r.split(',');
            return { plate: (c[0]||"").replace(/[^0-9]/g, '').trim(), name: (c[3]||"不明").trim() };
        }).filter(e => e.plate !== "");
        statusDiv.innerText = "名簿読込完了";
    };
    reader.readAsText(e.target.files[0], 'UTF-8');
};

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
    video.srcObject = stream;
}

shutter.onclick = async () => {
    if (isProcessing || employeeList.length === 0) return;
    isProcessing = true;
    statusDiv.innerText = "解析中...";
    canvasHolder.innerHTML = "";

    const vW = video.videoWidth;
    const vH = video.videoHeight;
    const guideW = vW * 0.8;
    const guideH = guideW * 0.5;
    const startX = (vW - guideW) / 2;
    const startY = (vH - guideH) / 2;

    // 芳岡さんの最新実測データ (訂正版)
    // 左端(x), 上端(y), 幅(w), 高さ(h)
    const charCoords = [
        { x: 59,  y: 56, w: 66, h: 103 }, // 左1: 59~125, 56~159
        { x: 116, y: 56, w: 62, h: 103 }, // 左2: 116~178, 56~159
        { x: 198, y: 56, w: 64, h: 103 }, // 右2: 198~262付近（調整）, 56~159
        { x: 257, y: 56, w: 66, h: 103 }  // 右1: 257~323, 56~159
    ];

    let finalNum = "";

    for (const coord of charCoords) {
        const c = document.createElement('canvas');
        c.width = 120; c.height = 180;
        const ctx = c.getContext('2d');
        
        const realX = startX + (guideW * (coord.x / 330));
        const realY = startY + (guideH * (coord.y / 165));
        const realW = guideW * (coord.w / 330);
        const realH = guideH * (coord.h / 165);

        ctx.filter = "contrast(170%) grayscale(100%)";
        ctx.drawImage(video, realX, realY, realW, realH, 0, 0, 120, 180);
        
        c.className = "debug-canvas";
        canvasHolder.appendChild(c);

        const char = await recognizeChar(c);
        finalNum += char; 
    }

    const matches = employeeList.filter(e => e.plate === finalNum);
    
    if (matches.length > 0) {
        statusDiv.innerText = "照合一致";
        infoDisplay.innerHTML = `<span class="res-plate-num">${finalNum}</span><div style="text-align:center; font-size:20px;">${matches[0].name}さん</div>`;
        speak(matches[0].name + "さん");
    } else {
        statusDiv.innerText = "未登録または再試行";
        infoDisplay.innerHTML = `<span class="res-plate-num">${finalNum || "----"}</span>`;
        speak(finalNum ? "未登録です" : "もう一度");
    }
    isProcessing = false;
};

function speak(t) {
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

window.onload = startCamera;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車両照合（完成度極限版）</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding-bottom: 50px; }
        #camera-container { position: sticky; top: 0; background: #000; height: 30vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #focus-guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70vw; height: 35vw; border: 3px solid #00FF00; border-radius: 12px;
            box-shadow: 0 0 0 5000px rgba(0, 0, 0, 0.5); pointer-events: none;
        }
        #action-area { display: flex; justify-content: center; margin: -30px auto 10px; position: relative; z-index: 100; }
        .shutter-btn { width: 75px; height: 75px; background: white; border: 6px solid #007AFF; border-radius: 50%; font-weight:bold; cursor:pointer; }
        #result-container { margin: 10px 15px; padding: 15px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .plate-box { background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: inline-block; width: 95%; }
        .plate-top { font-size: 20px; font-weight: bold; color: #444; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 10px; }
        .plate-bottom { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .plate-kana { font-size: 38px; font-weight: bold; color: #333; background: #fff; padding: 0 10px; border-radius: 4px; border: 1px solid #999; min-width: 50px; }
        .plate-main { font-size: 48px; font-weight: bold; color: #007AFF; }
        #status { font-size: 14px; color: #007AFF; font-weight: bold; margin-bottom: 5px; }
        .debug-canvas { border: 1px solid #333; background: white; margin: 2px; }
    </style>
</head>
<body>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <div id="focus-guide"></div>
</div>

<div id="action-area"><button id="shutter" class="shutter-btn">照合</button></div>

<div id="result-container">
    <div id="status">Ready</div>
    <div id="info-display">
        <div class="plate-box">
            <div class="plate-top">地名 ---</div>
            <div class="plate-bottom"><span class="plate-kana">？</span><span class="plate-main">----</span></div>
        </div>
    </div>
    <div style="margin-top:10px;">
        <input type="number" id="manualNum" style="font-size:18px; width:80px; padding:5px;" placeholder="4桁">
        <button onclick="manualSearch()" style="padding:6px 12px; background:#007AFF; color:white; border:none; border-radius:4px;">手動検索</button>
    </div>
    <button onclick="document.getElementById('fileInput').click()" style="background:#34c759; color:white; padding:10px; border:none; border-radius:8px; font-weight:bold; margin-top:15px; width:100%;">名簿CSV読込</button>
    <input type="file" id="fileInput" accept=".csv" style="display:none;">
</div>

<div id="debug-area" style="font-size:9px; color:#666;">
    <canvas id="c-area" class="debug-canvas" width="120" height="60"></canvas>
    <canvas id="c-sub" class="debug-canvas" width="100" height="60"></canvas>
    <canvas id="c-kana" class="debug-canvas" width="60" height="80"></canvas>
    <canvas id="c-main" class="debug-canvas" width="200" height="80"></canvas>
</div>

<script>
const video = document.getElementById('video');
const shutter = document.getElementById('shutter');
const statusDiv = document.getElementById('status');
const infoDisplay = document.getElementById('info-display');
const fileInput = document.getElementById('fileInput');

let employeeList = [];
let isProcessing = false;

// 座標微調整：メイン数字をさらに右に(80->90)ずらし、ドット混入を回避
const coords = {
    area: { x: 71,  y: 6,   w: 100, h: 54 },
    sub:  { x: 178, y: 6,   w: 86,  h: 54 },
    kana: { x: 12,  y: 81,  w: 49,  h: 68 }, 
    main: { x: 90,  y: 56,  w: 232, h: 103 } 
};

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
    video.srcObject = stream;
}

function getOptimizedCrop(canvasId, rect, contrast, brightness) {
    const vW = video.videoWidth, vH = video.videoHeight;
    const gW = vW * 0.7, gH = gW * (165/330);
    const sX = (vW - gW) / 2, sY = (vH - gH) / 2;
    const c = document.getElementById(canvasId);
    const ctx = c.getContext('2d');
    ctx.filter = "none"; ctx.fillStyle = "white"; ctx.fillRect(0, 0, c.width, c.height);
    ctx.filter = `contrast(${contrast}%) brightness(${brightness}%) grayscale(100%)`;
    ctx.drawImage(video, sX+(gW*(rect.x/330)), sY+(gH*(rect.y/165)), gW*(rect.w/330), gH*(rect.h/165), 0, 0, c.width, c.height);
    return c;
}

async function doOCR(canvas, lang, psm, whitelist) {
    const worker = await Tesseract.createWorker();
    await worker.loadLanguage(lang);
    await worker.initialize(lang);
    const params = { tessedit_pageseg_mode: psm };
    if(whitelist) params.tessedit_char_whitelist = whitelist;
    await worker.setParameters(params);
    const result = await worker.recognize(canvas);
    await worker.terminate();
    return result.data.text.trim();
}

shutter.onclick = async () => {
    if (isProcessing || employeeList.length === 0) return;
    isProcessing = true;
    statusDiv.innerText = "照合中...";

    // 黄色ナンバーを想定し、少し明るめに抽出
    const cArea = getOptimizedCrop('c-area', coords.area, 170, 110);
    const cSub  = getOptimizedCrop('c-sub',  coords.sub,  180, 110);
    const cKana = getOptimizedCrop('c-kana', coords.kana, 200, 105);
    const cMain = getOptimizedCrop('c-main', coords.main, 180, 110);

    let [rArea, rSub, rKana, rMain] = await Promise.all([
        doOCR(cArea, 'jpn', '7'),
        doOCR(cSub,  'eng', '8', '0123456789'),
        doOCR(cKana, 'jpn', '10'),
        doOCR(cMain, 'eng', '8', '0123456789')
    ]);

    // 【補正】地名：那須・宇都宮への強力な寄せ
    let area = "？？";
    if (rArea.includes("那") || rArea.includes("須")) area = "那須";
    else if (rArea.includes("宇") || rArea.includes("都") || rArea.includes("宮")) area = "宇都宮";
    else if (rArea.includes("静") || rArea.includes("岡")) area = "静岡";

    // 【補正】分類番号：必ず3桁、または2桁
    let sub = rSub.replace(/[^0-9]/g, '');
    if (sub.length > 3) sub = sub.slice(-3);
    if (area === "那須" && sub.startsWith("0")) sub = "5" + sub.slice(1); // 083 -> 583

    // 【補正】かな：よくある誤読の置換
    let kana = rKana.replace(/[どど]/g, 'と').replace(/[るゐ]/g, 'ろ').replace(/[ごに]/g, 'に').replace(/[あめ]/g, 'む').replace(/[^ぁ-ん]/g, '').slice(0,1) || "？";

    // 【補正】メイン数字：ドット（・）の誤読による桁数オーバーを防ぐ
    let main = rMain.replace(/[^0-9]/g, '');
    if (main.length >= 2 && (main.startsWith("1") || main.startsWith("7") || main.startsWith("3"))) {
        // 例：「・・・3」が「31」や「81」になるのを防ぐため、怪しい先頭の1文字を消して再評価する仕組み
        // 今回は「右から1〜4桁」の確実な部分を残す
        if (main.length > 4) main = main.slice(-4);
    }

    showResults(area, sub, kana, main);
    isProcessing = false;
    statusDiv.innerText = "完了";
};

function showResults(area, sub, kana, main) {
    // 名簿照合：数字の完全一致をチェック
    const matches = employeeList.filter(e => e.plate === main);
    
    infoDisplay.innerHTML = `
        <div class="plate-box">
            <div class="plate-top">${area} ${sub}</div>
            <div class="plate-bottom">
                <span class="plate-kana">${kana}</span>
                <span class="plate-main">${main}</span>
            </div>
        </div>
        ${matches.length > 0 ? matches.map(m => `<div style="background:#e8f5e9; padding:10px; border-radius:8px; border:2px solid #4caf50; margin-top:5px; text-align:left;"><b>一致: ${m.name}</b></div>`).join('') : `<div style="background:#ffebee; padding:10px; border-radius:8px; border:2px solid #f44336; margin-top:5px;">該当なし (${main})</div>`}
    `;
    if(matches.length > 0) speak(matches[0].name + "さん");
}

function manualSearch() {
    const val = document.getElementById('manualNum').value;
    if(val) showResults("手動", "---", "-", val);
}

function speak(t) {
    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(t);
    s.lang = 'ja-JP'; window.speechSynthesis.speak(s);
}

fileInput.onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (event) => {
        employeeList = event.target.result.split('\n').filter(r => r.trim()).map(row => {
            const cols = row.split(',');
            return { plate: (cols[0]||"").replace(/[^0-9]/g, '').trim(), name: (cols[3]||"不明").trim() };
        });
        statusDiv.innerText = "名簿読込済 (" + (employeeList.length - 1) + "件)";
    };
    reader.readAsText(e.target.files[0], 'UTF-8');
};

window.onload = startCamera;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車両照合（一括認識・実測範囲版）</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding-bottom: 50px; }
        #camera-container { position: sticky; top: 0; background: #000; z-index: 10; height: 35vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #focus-guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70vw; height: 35vw; border: 3px solid #00FF00; border-radius: 12px;
            box-shadow: 0 0 0 5000px rgba(0, 0, 0, 0.5); pointer-events: none;
        }
        #action-area { display: flex; justify-content: center; align-items: center; gap: 20px; margin: -40px auto 10px; position: relative; z-index: 100; }
        .shutter-btn { width: 80px; height: 80px; background: white; border: 6px solid #007AFF; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.3); outline: none; }
        #result-container { margin: 10px 15px; min-height: 100px; padding: 15px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); text-align: left; }
        #status { font-size: 14px; color: #007AFF; margin-bottom: 10px; font-weight: bold; text-align: center; background: #eef; padding: 5px; border-radius: 4px; }
        .res-plate-num { font-size: 32px; font-weight: bold; color: #007AFF; text-align: center; display: block; }
        #debug-area { background: #eee; padding: 10px; margin: 10px; font-size: 11px; border-radius: 8px; }
        #debug-canvas { border: 2px solid #333; width: 100%; max-width: 300px; height: auto; background: white; }
        #history-area { margin: 15px; text-align: left; }
        .card { background: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 8px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
        .card.match { border-left-color: #28a745; }
        .card.alert { border-left-color: #dc3545; }
    </style>
</head>
<body>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <div id="focus-guide"></div>
    </div>
    
    <div id="action-area">
        <button id="shutter" class="shutter-btn"></button>
    </div>

    <div style="margin: 15px;">
        <label style="background: #34c759; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px;">
            名簿(CSV)選択<input type="file" id="fileInput" accept=".csv" style="display:none;">
        </label>
        <div id="file-status" style="font-size: 11px; color: #666; margin-top: 5px;">名簿を読み込んでください</div>
    </div>

    <div id="result-container">
        <div id="status">準備中...</div>
        <div id="info-display"></div>
    </div>

    <div id="debug-area">
        【実測一括・読取り範囲プレビュー】<br>
        <canvas id="debug-canvas"></canvas>
    </div>

    <div id="history-area"><div id="history-items"></div></div>

<script>
const video = document.getElementById('video');
const shutter = document.getElementById('shutter');
const statusDiv = document.getElementById('status');
const infoDisplay = document.getElementById('info-display');
const debugCanvas = document.getElementById('debug-canvas');
const historyItems = document.getElementById('history-items');
const fileInput = document.getElementById('fileInput');

let employeeList = [];
let isProcessing = false;

function speak(t) {
    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(t);
    s.lang = 'ja-JP';
    window.speechSynthesis.speak(s);
}

fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        const rows = event.target.result.split('\n');
        employeeList = rows.filter(r => r.trim()).map(row => {
            const cols = row.split(',');
            return { plate: (cols[0]||"").replace(/[^0-9]/g, '').trim(), name: (cols[3]||"不明").trim() };
        }).filter(e => e.plate !== "");
        document.getElementById('file-status').innerText = `読込完了: ${employeeList.length}件`;
        statusDiv.innerText = "準備完了";
    };
    reader.readAsText(file, 'UTF-8');
});

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
        video.srcObject = stream;
    } catch(err) {
        alert("カメラ起動エラー: " + err);
    }
}

shutter.onclick = async () => {
    if (isProcessing || employeeList.length === 0) return;
    isProcessing = true;
    statusDiv.innerText = "一括解析中...";
    
    const vW = video.videoWidth;
    const vH = video.videoHeight;
    const guideW = vW * 0.7; 
    const guideH = guideW * (165/330);
    const startX = (vW - guideW) / 2;
    const startY = (vH - guideH) / 2;

    // 芳岡さん指定の一括範囲: (59, 56)から(323, 159)
    // 323 - 59 = 264 (幅), 159 - 56 = 103 (高さ)
    const rect = { x: 59, y: 56, w: 264, h: 103 };

    const ctx = debugCanvas.getContext('2d');
    debugCanvas.width = 600; debugCanvas.height = 240;
    
    const realX = startX + (guideW * (rect.x / 330));
    const realY = startY + (guideH * (rect.y / 165));
    const realW = guideW * (rect.w / 330);
    const realH = guideH * (rect.h / 165);

    // 画像フィルタ：コントラストを上げて文字を強調
    ctx.filter = "contrast(180%) grayscale(100%) brightness(100%)";
    ctx.drawImage(video, realX, realY, realW, realH, 0, 0, 600, 240);
    
    // 一括認識 (PSM 7: 単一行として認識)
    const result = await Tesseract.recognize(debugCanvas, 'eng', {
        tessedit_char_whitelist: '0123456789',
        tessedit_pageseg_mode: '7' 
    });

    const detectedNum = result.data.text.replace(/[^0-9]/g, '').trim();
    
    const matches = employeeList.filter(emp => emp.plate === detectedNum);
    if (matches.length > 0) {
        statusDiv.innerText = "照合一致";
        infoDisplay.innerHTML = `<span class="res-plate-num">${detectedNum}</span><div style="text-align:center;">${matches[0].name}さん</div>`;
        speak(matches[0].name + "さん");
        addHistory(detectedNum, matches[0], "match");
    } else {
        statusDiv.innerText = detectedNum ? "未登録" : "読み取り失敗";
        infoDisplay.innerHTML = `<span class="res-plate-num">${detectedNum || "----"}</span>`;
        speak(detectedNum ? "未登録です" : "もう一度");
        if(detectedNum) addHistory(detectedNum, {name:"未登録"}, "alert");
    }

    isProcessing = false;
};

function addHistory(num, data, type) {
    const card = document.createElement('div');
    card.className = `card ${type}`;
    card.innerHTML = `<div><b>${num}</b> : ${data.name}</div><div style="font-size:11px; color:#999;">${new Date().toLocaleTimeString()}</div>`;
    historyItems.prepend(card);
}

window.onload = startCamera;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車両照合（ひらがな座標指定版）</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding-bottom: 50px; }
        #camera-container { position: sticky; top: 0; background: #000; height: 30vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #focus-guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70vw; height: 35vw; border: 3px solid #00FF00; border-radius: 12px;
            box-shadow: 0 0 0 5000px rgba(0, 0, 0, 0.5); pointer-events: none;
        }
        #action-area { display: flex; justify-content: center; margin: -30px auto 10px; position: relative; z-index: 100; }
        .shutter-btn { width: 70px; height: 70px; background: white; border: 6px solid #007AFF; border-radius: 50%; font-weight:bold; }
        #result-container { margin: 10px 15px; padding: 15px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .plate-box { background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: inline-block; width: 95%; }
        .plate-top { font-size: 20px; font-weight: bold; color: #555; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 10px; }
        .plate-bottom { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .plate-kana { font-size: 38px; font-weight: bold; color: #333; background: #fff; padding: 0 10px; border-radius: 4px; border: 1px solid #999; min-width: 50px; }
        .plate-main { font-size: 48px; font-weight: bold; color: #007AFF; letter-spacing: 2px; }
        .debug-canvas { border: 1px solid #333; background: white; margin: 2px; height: 40px; }
    </style>
</head>
<body>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <div id="focus-guide"></div>
</div>

<div id="action-area"><button id="shutter" class="shutter-btn">撮影</button></div>

<div id="result-container">
    <div id="status">Ready</div>
    <div id="info-display">
        <div class="plate-box">
            <div class="plate-top">？？ ---</div>
            <div class="plate-bottom">
                <span class="plate-kana">？</span>
                <span class="plate-main">----</span>
            </div>
        </div>
    </div>
    <div style="margin-top:10px;">
        <input type="number" id="manualNum" style="font-size:18px; width:80px; padding:5px;" placeholder="4桁">
        <button onclick="manualSearch()" style="padding:6px 12px; background:#007AFF; color:white; border:none; border-radius:4px;">手動検索</button>
    </div>
    <button onclick="document.getElementById('fileInput').click()" style="background:#34c759; color:white; padding:10px; border:none; border-radius:8px; font-weight:bold; margin-top:15px; width:100%;">名簿CSV読込</button>
    <input type="file" id="fileInput" accept=".csv" style="display:none;">
</div>

<div id="debug-area" style="font-size:9px; color:#666;">
    【OCR解析プレビュー】<br>
    <canvas id="c-area" class="debug-canvas"></canvas>
    <canvas id="c-sub" class="debug-canvas"></canvas>
    <canvas id="c-kana" class="debug-canvas"></canvas>
    <canvas id="c-main" class="debug-canvas"></canvas>
</div>

<script>
const video = document.getElementById('video');
const shutter = document.getElementById('shutter');
const statusDiv = document.getElementById('status');
const infoDisplay = document.getElementById('info-display');
const fileInput = document.getElementById('fileInput');

let employeeList = [];
let isProcessing = false;

// 指定座標の適用（相対座標に変換）
const coords = {
    area: { x: 71,  y: 6,   w: 100, h: 54 },
    sub:  { x: 178, y: 6,   w: 86,  h: 54 },
    kana: { x: 12,  y: 81,  w: 49,  h: 68 }, // 芳岡さん指定範囲 (12,81)～(61,149)
    main: { x: 72,  y: 56,  w: 250, h: 103 } 
};

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
    video.srcObject = stream;
}

function getCrop(rect, contrast, brightness) {
    const vW = video.videoWidth, vH = video.videoHeight;
    const gW = vW * 0.7, gH = gW * (165/330);
    const sX = (vW - gW) / 2, sY = (vH - gH) / 2;
    
    const c = document.createElement('canvas');
    c.width = rect.w * 2; c.height = rect.h * 2;
    const ctx = c.getContext('2d');
    ctx.filter = `contrast(${contrast}%) brightness(${brightness}%) grayscale(100%)`;
    ctx.drawImage(video, sX+(gW*(rect.x/330)), sY+(gH*(rect.y/165)), gW*(rect.w/330), gH*(rect.h/165), 0, 0, c.width, c.height);
    return c;
}

async function doOCR(canvas, lang, psm, whitelist) {
    const worker = await Tesseract.createWorker();
    await worker.loadLanguage(lang);
    await worker.initialize(lang);
    const params = { tessedit_pageseg_mode: psm };
    if(whitelist) params.tessedit_char_whitelist = whitelist;
    await worker.setParameters(params);
    const result = await worker.recognize(canvas);
    await worker.terminate();
    return result.data.text.trim();
}

shutter.onclick = async () => {
    if (isProcessing || employeeList.length === 0) return;
    isProcessing = true;
    statusDiv.innerText = "フルスキャン中...";

    // 抽出と画像補正
    const cArea = getCrop(coords.area, 180, 100);
    const cSub  = getCrop(coords.sub,  220, 100);
    const cKana = getCrop(coords.kana, 250, 90);  // ひらがなはコントラスト強め
    const cMain = getCrop(coords.main, 220, 100);

    // デバッグプレビュー表示
    const showDbg = (id, cvs) => document.getElementById(id).getContext('2d').drawImage(cvs, 0, 0, 100, 40);
    showDbg('c-area', cArea); showDbg('c-sub', cSub); showDbg('c-kana', cKana); showDbg('c-main', cMain);

    const [rArea, rSub, rKana, rMain] = await Promise.all([
        doOCR(cArea, 'jpn', '7'),
        doOCR(cSub,  'eng', '8', '0123456789'),
        doOCR(cKana, 'jpn', '10'),
        doOCR(cMain, 'eng', '8', '0123456789')
    ]);

    // 文字処理
    const area = rArea.includes("那") ? "那須" : (rArea.includes("宇") ? "宇都宮" : "？？");
    const sub = rSub.replace(/[^0-9]/g, '').slice(-3);
    const kana = rKana.replace(/[^ぁ-ん]/g, '').slice(0,1) || "？";
    const main = rMain.replace(/[^0-9]/g, '').slice(-4);

    showResults(area, sub, kana, main);
    isProcessing = false;
    statusDiv.innerText = "照合完了";
};

function showResults(area, sub, kana, main) {
    const matches = employeeList.filter(e => e.plate === main);
    infoDisplay.innerHTML = `
        <div class="plate-box">
            <div class="plate-top">${area} ${sub}</div>
            <div class="plate-bottom">
                <span class="plate-kana">${kana}</span>
                <span class="plate-main">${main}</span>
            </div>
        </div>
        ${matches.length > 0 ? matches.map(m => `<div class="match-item" style="background:#e8f5e9; padding:10px; border-radius:8px; border:2px solid #4caf50; margin-top:5px; text-align:left;"><b>一致: ${m.name}</b></div>`).join('') : `<div class="no-match" style="background:#ffebee; padding:10px; border-radius:8px; border:2px solid #f44336; margin-top:5px;">該当なし</div>`}
    `;
    if(matches.length > 0) speak(matches[0].name + "さん");
}

function manualSearch() {
    const val = document.getElementById('manualNum').value;
    if(val) showResults("手動", "---", "-", val);
}

function speak(t) {
    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(t);
    s.lang = 'ja-JP'; window.speechSynthesis.speak(s);
}

fileInput.onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (event) => {
        employeeList = event.target.result.split('\n').filter(r => r.trim()).map(row => {
            const cols = row.split(',');
            return { plate: (cols[0]||"").replace(/[^0-9]/g, '').trim(), name: (cols[3]||"不明").trim() };
        });
        statusDiv.innerText = "名簿読込済 (" + (employeeList.length - 1) + "件)";
    };
    reader.readAsText(e.target.files[0], 'UTF-8');
};

window.onload = startCamera;
</script>
</body>
</html>

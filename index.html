<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車両照合（トリプルスキャン安定版）</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding-bottom: 50px; }
        #camera-container { position: sticky; top: 0; background: #000; height: 35vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #focus-guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70vw; height: 35vw; border: 3px solid #00FF00; border-radius: 12px;
            box-shadow: 0 0 0 5000px rgba(0, 0, 0, 0.5); pointer-events: none;
        }
        #action-area { display: flex; justify-content: center; margin: -40px auto 10px; position: relative; z-index: 100; }
        .shutter-btn { width: 80px; height: 80px; background: white; border: 6px solid #007AFF; border-radius: 50%; font-weight:bold; }
        #result-container { margin: 10px 15px; padding: 15px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #status { font-size: 14px; color: #007AFF; font-weight: bold; background: #eef; padding: 5px; border-radius: 4px; }
        .main-num { font-size: 48px; font-weight: bold; color: #007AFF; }
        .debug-canvas { border: 1px solid #333; background: white; margin: 2px; height: 45px; }
    </style>
</head>
<body>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <div id="focus-guide"></div>
</div>

<div id="action-area"><button id="shutter" class="shutter-btn">照合</button></div>

<div id="result-container">
    <div id="status">Ready</div>
    <div id="info-display"></div>
    <input type="file" id="fileInput" accept=".csv" style="display:none;">
    <button onclick="document.getElementById('fileInput').click()" style="background:#34c759; color:white; padding:8px 16px; border:none; border-radius:8px; font-weight:bold; margin-top:10px;">名簿CSV選択</button>
</div>

<div id="debug-area" style="font-size:10px;">
    【解析プレビュー】<br>
    <canvas id="canvas-area" class="debug-canvas"></canvas>
    <canvas id="canvas-sub" class="debug-canvas"></canvas>
    <canvas id="canvas-main" class="debug-canvas"></canvas>
</div>

<div id="history-items"></div>

<script>
const video = document.getElementById('video');
const shutter = document.getElementById('shutter');
const statusDiv = document.getElementById('status');
const infoDisplay = document.getElementById('info-display');
const historyItems = document.getElementById('history-items');
const fileInput = document.getElementById('fileInput');

const canvases = { area: document.getElementById('canvas-area'), sub: document.getElementById('canvas-sub'), main: document.getElementById('canvas-main') };
let employeeList = [];
let isProcessing = false;

const areaList = ["札幌","函館","旭川","室蘭","苫小牧","釧路","知床","帯広","十勝","北見","青森","弘前","八戸","岩手","盛岡","平泉","宮城","仙台","秋田","山形","庄内","福島","会津","郡山","白河","いわき","水戸","土浦","つくば","宇都宮","日光","那須","とちぎ","群馬","高崎","前橋","千葉","成田","野田","柏","松戸","習志野","船橋","市川","袖ヶ浦","市原","大宮","川口","熊谷","春日部","越谷","所沢","川越","品川","世田谷","足立","江東","葛飾","江戸川","練馬","杉並","板橋","多摩","八王子","横浜","川崎","相模","湘南","山梨","富士山","新潟","長岡","上越","長野","松本","諏訪","南信州","安曇野","富山","石川","金沢","名古屋","三河","岡崎","豊田","尾張小牧","一宮","春日井","豊橋","静岡","沼津","伊豆","浜松","岐阜","飛騨","三重","鈴鹿","四日市","伊勢志摩","福井","大阪","なにわ","和泉","堺","京都","奈良","飛鳥","滋賀","和歌山","神戸","姫路","広島","福山","鳥取","島根","出雲","岡山","倉敷","山口","下関","徳島","香川","高松","愛媛","高知","福岡","北九州","筑豊","久留米","佐賀","長崎","佐世保","熊本","大分","宮崎","鹿児島","奄美","沖縄"];

function fixAreaName(rawText) {
    if (!rawText || rawText.length < 2) return rawText;
    let bestMatch = rawText, maxScore = 0;
    areaList.forEach(area => {
        let score = 0;
        for(let char of rawText) if(area.includes(char)) score++;
        // 宇都宮対策：2文字以上一致、かつ全体の6割以上一致で補正
        if(score > maxScore && score >= 2 && score >= (area.length * 0.6)) { maxScore = score; bestMatch = area; }
    });
    return bestMatch;
}

fileInput.onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (event) => {
        employeeList = event.target.result.split('\n').filter(r => r.trim()).map(row => {
            const cols = row.split(',');
            return { plate: (cols[0]||"").replace(/[^0-9]/g, '').trim(), name: (cols[3]||"不明").trim() };
        }).filter(e => e.plate !== "");
        statusDiv.innerText = "名簿読込完了";
    };
    reader.readAsText(e.target.files[0], 'UTF-8');
};

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
    video.srcObject = stream;
}

// 読み取りの「粘り」を強化したOCR関数
async function deepScan(canvas, lang, psm, whitelist) {
    const worker = await Tesseract.createWorker();
    await worker.loadLanguage(lang);
    await worker.initialize(lang);
    await worker.setParameters({
        tessedit_char_whitelist: whitelist || '',
        tessedit_pageseg_mode: psm,
        // 1桁や細い文字を拾うためのパラメータ
        tessjs_create_hocr: '0',
        tessjs_create_tsv: '0',
    });
    const result = await worker.recognize(canvas);
    await worker.terminate();
    return result.data.text.replace(/[^0-9\u4e00-\u9faf\u3040-\u309f]/g, '').trim();
}

shutter.onclick = async () => {
    if (isProcessing || employeeList.length === 0) return;
    isProcessing = true;
    statusDiv.innerText = "精密スキャン中...";

    const vW = video.videoWidth, vH = video.videoHeight;
    const gW = vW * 0.7, gH = gW * (165/330);
    const sX = (vW - gW) / 2, sY = (vH - gH) / 2;

    const draw = (cvs, rect, w, h, contrast) => {
        cvs.width = w + 80; cvs.height = h + 80;
        const ctx = cvs.getContext('2d');
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, cvs.width, cvs.height);
        ctx.filter = `contrast(${contrast}%) grayscale(100%) brightness(90%)`;
        ctx.drawImage(video, sX+(gW*(rect.x/330)), sY+(gH*(rect.y/165)), gW*(rect.w/330), gH*(rect.h/165), 40, 40, w, h);
    };

    const coords = { area: { x: 71, y: 6, w: 108, h: 54 }, sub: { x: 176, y: 6, w: 88, h: 54 }, main: { x: 59, y: 56, w: 264, h: 103 } };
    
    // 描画（コントラストを250%まで強化）
    draw(canvases.area, coords.area, 300, 150, 200);
    draw(canvases.sub,  coords.sub,  250, 150, 250);
    draw(canvases.main, coords.main, 600, 240, 250);

    // 解析（地名は単一行モード7、数字は単一単語モード8）
    const [rawArea, numSub, numMain] = await Promise.all([
        deepScan(canvases.area, 'jpn', '7'),
        deepScan(canvases.sub,  'eng', '8', '0123456789'),
        deepScan(canvases.main, 'eng', '8', '0123456789')
    ]);

    const areaName = fixAreaName(rawArea);
    const matches = employeeList.filter(emp => emp.plate === numMain);
    
    statusDiv.innerText = matches.length > 0 ? "照合一致" : "照合なし";
    infoDisplay.innerHTML = `<div class="plate-display">
        <div class="plate-top">${areaName} ${numSub}</div>
        <div class="main-num">${numMain || "----"}</div>
        <div style="font-size:22px; font-weight:bold;">${matches[0]?.name || (numMain ? "未登録" : "再試行してください")}</div>
    </div>`;

    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(matches[0] ? matches[0].name + "さん" : (numMain ? "未登録" : "もう一度"));
    s.lang = 'ja-JP'; window.speechSynthesis.speak(s);

    const card = document.createElement('div');
    card.style = "background:white; padding:10px; border-radius:8px; margin:5px 15px; border-left:8px solid " + (matches[0]?'#28a745':'#ccc');
    card.innerHTML = `<span>${areaName}${numSub} ${numMain}</span> <span style="float:right">${matches[0]?.name || "未登録"}</span>`;
    historyItems.prepend(card);

    isProcessing = false;
};

window.onload = startCamera;
</script>
</body>
</html>

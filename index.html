<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車両照合（ワイルドカード・手動補完版）</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding-bottom: 50px; }
        #camera-container { position: sticky; top: 0; background: #000; height: 30vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #focus-guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70vw; height: 35vw; border: 3px solid #00FF00; border-radius: 12px;
            box-shadow: 0 0 0 5000px rgba(0, 0, 0, 0.5); pointer-events: none;
        }
        #action-area { display: flex; justify-content: center; margin: -30px auto 10px; position: relative; z-index: 100; }
        .shutter-btn { width: 70px; height: 70px; background: white; border: 6px solid #007AFF; border-radius: 50%; font-weight:bold; cursor: pointer; }
        
        #result-container { margin: 10px 15px; padding: 15px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .plate-box { background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .plate-top { font-size: 20px; font-weight: bold; color: #555; }
        .plate-main { font-size: 40px; font-weight: bold; color: #007AFF; }
        
        #status { font-size: 14px; color: #007AFF; font-weight: bold; margin-bottom: 10px; }
        .match-item { background: #e8f5e9; border: 2px solid #4caf50; padding: 10px; border-radius: 8px; margin-top: 5px; text-align: left; }
        .no-match { background: #ffebee; border: 2px solid #f44336; padding: 10px; border-radius: 8px; margin-top: 5px; }
        
        #manual-input-area { margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px; }
        input[type="number"] { font-size: 20px; width: 120px; padding: 5px; border-radius: 4px; border: 1px solid #ccc; }
        .btn-small { padding: 8px 15px; border-radius: 4px; border: none; background: #007AFF; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <div id="focus-guide"></div>
</div>

<div id="action-area"><button id="shutter" class="shutter-btn">撮影</button></div>

<div id="result-container">
    <div id="status">Ready</div>
    <div id="info-display">
        <div class="plate-box">
            <div class="plate-top">？？ ??</div>
            <div class="plate-main">----</div>
        </div>
    </div>

    <div id="manual-input-area">
        <input type="number" id="manualNum" placeholder="4桁数字">
        <button onclick="manualSearch()" class="btn-small">手動検索</button>
    </div>

    <input type="file" id="fileInput" accept=".csv" style="display:none;">
    <button onclick="document.getElementById('fileInput').click()" style="background:#34c759; color:white; padding:8px 16px; border:none; border-radius:8px; font-weight:bold; margin-top:15px; width: 100%;">名簿CSVを読み込む</button>
</div>

<div id="history-items"></div>

<script>
const video = document.getElementById('video');
const shutter = document.getElementById('shutter');
const statusDiv = document.getElementById('status');
const infoDisplay = document.getElementById('info-display');
const historyItems = document.getElementById('history-items');
const fileInput = document.getElementById('fileInput');

let employeeList = [];
let isProcessing = false;

// 地域特性に合わせて「那須」と「宇都宮」を強めに
const commonAreas = ["那須", "宇都宮"];
const otherAreas = ["とちぎ", "日光", "静岡", "和泉", "水戸", "土浦", "福島"];

function fixAreaName(rawText) {
    if (!rawText) return "??";
    // 特定の誤読パターンを補正
    let clean = rawText.replace(/[子酪旨和]/g, m => ({'子':'宇','酪':'静','旨':'宮','和':'宇'})[m] || m);
    
    // まず優先地域をチェック
    for(let a of commonAreas) {
        let score = 0;
        for(let char of clean) if(a.includes(char)) score++;
        if(score >= 1) return a; 
    }
    // その他
    for(let a of otherAreas) {
        if(clean.includes(a[0]) || clean.includes(a[1])) return a;
    }
    return "??";
}

function cleanNumber(text, limit) {
    let num = text.replace(/[^0-9]/g, '');
    if (!num || num.length > 5) return "??"; // 5桁以上はノイズとして捨てる
    return num;
}

function searchEmployee(plateNum) {
    if (!plateNum || plateNum === "??") return [];
    return employeeList.filter(emp => emp.plate === plateNum);
}

function displayResults(area, sub, main) {
    const matches = searchEmployee(main);
    let html = `
        <div class="plate-box">
            <div class="plate-top">${area} ${sub}</div>
            <div class="plate-main">${main}</div>
        </div>`;

    if (matches.length > 0) {
        matches.forEach(m => {
            html += `<div class="match-item"><b>一致: ${m.name}</b><br><small>名簿登録: ${m.plate}</small></div>`;
        });
        speak(matches[0].name + "さんです");
    } else if (main !== "??") {
        html += `<div class="no-match">該当者なし (${main})</div>`;
        speak("該当なし");
    }

    infoDisplay.innerHTML = html;
    document.getElementById('manualNum').value = (main === "??" ? "" : main);
}

function manualSearch() {
    const num = document.getElementById('manualNum').value;
    if (num) displayResults("手動入力", "--", num);
}

async function deepScan(canvas, psm, whitelist) {
    const worker = await Tesseract.createWorker();
    await worker.loadLanguage(psm === '7' ? 'jpn' : 'eng');
    await worker.initialize(psm === '7' ? 'jpn' : 'eng');
    if(whitelist) await worker.setParameters({ tessedit_char_whitelist: whitelist });
    await worker.setParameters({ tessedit_pageseg_mode: psm });
    const result = await worker.recognize(canvas);
    await worker.terminate();
    return result.data.text.trim();
}

shutter.onclick = async () => {
    if (isProcessing || employeeList.length === 0) return;
    isProcessing = true;
    statusDiv.innerText = "スキャン中...";

    const canvas = document.createElement('canvas');
    const vW = video.videoWidth, vH = video.videoHeight;
    const gW = vW * 0.7, gH = gW * (165/330);
    const sX = (vW - gW) / 2, sY = (vH - gH) / 2;

    const getCrop = (rect, contrast) => {
        const c = document.createElement('canvas');
        c.width = rect.w * 2; c.height = rect.h * 2;
        const ctx = c.getContext('2d');
        ctx.filter = `contrast(${contrast}%) grayscale(100%)`;
        ctx.drawImage(video, sX+(gW*(rect.x/330)), sY+(gH*(rect.y/165)), gW*(rect.w/330), gH*(rect.h/165), 0, 0, c.width, c.height);
        return c;
    };

    const cArea = getCrop({ x: 71, y: 6, w: 100, h: 54 }, 180);
    const cSub  = getCrop({ x: 178, y: 6, w: 86, h: 54 }, 220);
    const cMain = getCrop({ x: 59, y: 56, w: 264, h: 103 }, 220);

    const [rArea, rSub, rMain] = await Promise.all([
        deepScan(cArea, '7'),
        deepScan(cSub, '8', '0123456789'),
        deepScan(cMain, '8', '0123456789')
    ]);

    const area = fixAreaName(rArea);
    const sub = cleanNumber(rSub, 3);
    const main = cleanNumber(rMain, 4);

    displayResults(area, sub, main);
    isProcessing = false;
    statusDiv.innerText = "完了";
};

fileInput.onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (event) => {
        employeeList = event.target.result.split('\n').filter(r => r.trim()).map(row => {
            const cols = row.split(',');
            return { plate: (cols[0]||"").replace(/[^0-9]/g, '').trim(), name: (cols[3]||"不明").trim() };
        });
        statusDiv.innerText = "名簿読み込み完了: " + (employeeList.length - 1) + "名";
    };
    reader.readAsText(e.target.files[0], 'UTF-8');
};

function speak(t) {
    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(t);
    s.lang = 'ja-JP';
    window.speechSynthesis.speak(s);
}

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
        video.srcObject = stream;
    } catch (e) { statusDiv.innerText = "カメラ起動失敗"; }
}

window.onload = startCamera;
</script>
</body>
</html>

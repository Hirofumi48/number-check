<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車両照合（3桁+4桁 試作版）</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding-bottom: 50px; }
        #camera-container { position: sticky; top: 0; background: #000; z-index: 10; height: 35vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #focus-guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70vw; height: 35vw; border: 3px solid #00FF00; border-radius: 12px;
            box-shadow: 0 0 0 5000px rgba(0, 0, 0, 0.5); pointer-events: none;
        }
        #action-area { display: flex; justify-content: center; align-items: center; gap: 20px; margin: -40px auto 10px; position: relative; z-index: 100; }
        .shutter-btn { width: 80px; height: 80px; background: white; border: 6px solid #007AFF; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.3); outline: none; }
        
        #result-container { margin: 10px 15px; min-height: 120px; padding: 15px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); text-align: left; }
        #status { font-size: 14px; color: #007AFF; margin-bottom: 10px; font-weight: bold; text-align: center; background: #eef; padding: 5px; border-radius: 4px; }
        
        .plate-display { text-align: center; margin: 10px 0; }
        .sub-num { font-size: 18px; color: #666; margin-bottom: -5px; } /* 3桁部分 */
        .main-num { font-size: 36px; font-weight: bold; color: #007AFF; letter-spacing: 2px; } /* 4桁部分 */

        #debug-area { background: #eee; padding: 10px; margin: 10px; font-size: 11px; border-radius: 8px; }
        .debug-canvas { border: 1px solid #333; background: white; margin: 5px; height: 60px; width: auto; }
        
        #history-area { margin: 15px; text-align: left; }
        .card { background: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 8px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
        .card.match { border-left-color: #28a745; }
        .card.alert { border-left-color: #dc3545; }
    </style>
</head>
<body>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <div id="focus-guide"></div>
    </div>
    
    <div id="action-area">
        <button id="shutter" class="shutter-btn"></button>
    </div>

    <div style="margin: 15px;">
        <label style="background: #34c759; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px;">
            名簿(CSV)選択<input type="file" id="fileInput" accept=".csv" style="display:none;">
        </label>
        <div id="file-status" style="font-size: 11px; color: #666; margin-top: 5px;">名簿を読み込んでください</div>
    </div>

    <div id="result-container">
        <div id="status">準備完了</div>
        <div id="info-display"></div>
    </div>

    <div id="debug-area">
        【読取りプレビュー：上段(3桁) / 下段(4桁)】<br>
        <canvas id="canvas-sub" class="debug-canvas"></canvas><br>
        <canvas id="canvas-main" class="debug-canvas"></canvas>
    </div>

    <div id="history-area"><div id="history-items"></div></div>

<script>
const video = document.getElementById('video');
const shutter = document.getElementById('shutter');
const statusDiv = document.getElementById('status');
const infoDisplay = document.getElementById('info-display');
const canvasSub = document.getElementById('canvas-sub');
const canvasMain = document.getElementById('canvas-main');
const historyItems = document.getElementById('history-items');
const fileInput = document.getElementById('fileInput');

let employeeList = [];
let isProcessing = false;

function speak(t) {
    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(t);
    s.lang = 'ja-JP';
    window.speechSynthesis.speak(s);
}

fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        const rows = event.target.result.split('\n');
        employeeList = rows.filter(r => r.trim()).map(row => {
            const cols = row.split(',');
            return { plate: (cols[0]||"").replace(/[^0-9]/g, '').trim(), name: (cols[3]||"不明").trim() };
        }).filter(e => e.plate !== "");
        document.getElementById('file-status').innerText = `読込完了: ${employeeList.length}件`;
    };
    reader.readAsText(file, 'UTF-8');
});

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
    video.srcObject = stream;
}

async function ocrScan(canvas, psm) {
    const result = await Tesseract.recognize(canvas, 'eng', {
        tessedit_char_whitelist: '0123456789',
        tessedit_pageseg_mode: psm
    });
    return result.data.text.replace(/[^0-9]/g, '').trim();
}

shutter.onclick = async () => {
    if (isProcessing || employeeList.length === 0) return;
    isProcessing = true;
    statusDiv.innerText = "同時解析中...";
    
    const vW = video.videoWidth;
    const vH = video.videoHeight;
    const guideW = vW * 0.7; 
    const guideH = guideW * (165/330);
    const startX = (vW - guideW) / 2;
    const startY = (vH - guideH) / 2;

    // 座標定義
    const rectMain = { x: 59, y: 56, w: 264, h: 103 };  // 4桁メイン
    const rectSub  = { x: 169, y: 6,  w: 95,  h: 54 };  // 3桁分類 (264-169=95, 60-6=54)

    // メイン4桁の切り出し
    const ctxMain = canvasMain.getContext('2d');
    canvasMain.width = 500; canvasMain.height = 200;
    ctxMain.filter = "contrast(180%) grayscale(100%)";
    ctxMain.drawImage(video, startX + (guideW*(rectMain.x/330)), startY + (guideH*(rectMain.y/165)), guideW*(rectMain.w/330), guideH*(rectMain.h/165), 0, 0, 500, 200);

    // 分類3桁の切り出し
    const ctxSub = canvasSub.getContext('2d');
    canvasSub.width = 300; canvasSub.height = 150;
    ctxSub.filter = "contrast(180%) grayscale(100%)";
    ctxSub.drawImage(video, startX + (guideW*(rectSub.x/330)), startY + (guideH*(rectSub.y/165)), guideW*(rectSub.w/330), guideH*(rectSub.h/165), 0, 0, 300, 150);

    // OCR実行 (同時並行)
    const [numMain, numSub] = await Promise.all([
        ocrScan(canvasMain, '7'),
        ocrScan(canvasSub, '7')
    ]);

    const matches = employeeList.filter(emp => emp.plate === numMain);
    
    if (matches.length > 0) {
        statusDiv.innerText = "照合一致";
        infoDisplay.innerHTML = `
            <div class="plate-display">
                <div class="sub-num">${numSub || "---"}</div>
                <div class="main-num">${numMain}</div>
                <div style="font-size:20px; margin-top:10px;">${matches[0].name}さん</div>
            </div>`;
        speak(matches[0].name + "さん");
        addHistory(numMain, numSub, matches[0].name, "match");
    } else {
        statusDiv.innerText = numMain ? "未登録" : "読み取り失敗";
        infoDisplay.innerHTML = `
            <div class="plate-display">
                <div class="sub-num">${numSub || "---"}</div>
                <div class="main-num">${numMain || "----"}</div>
            </div>`;
        speak(numMain ? "未登録です" : "もう一度");
        if(numMain) addHistory(numMain, numSub, "未登録", "alert");
    }

    isProcessing = false;
};

function addHistory(main, sub, name, type) {
    const card = document.createElement('div');
    card.className = `card ${type}`;
    card.innerHTML = `<div>[${sub||'???'}] <b>${main}</b> : ${name}</div><div style="font-size:11px; color:#999;">${new Date().toLocaleTimeString()}</div>`;
    historyItems.prepend(card);
    if (historyItems.children.length > 10) historyItems.lastChild.remove();
}

window.onload = startCamera;
</script>
</body>
</html>
